<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Charisma Bus • Suivi facile</title>
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f9ff;  /* Bleu très clair */
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        /* ===== EN-TÊTE SUPER COLORÉ ===== */
        .top-bar {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            padding: 20px 15px 30px;
            border-radius: 0 0 40px 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .church-big {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .church-big .icon {
            font-size: 3.5em;
            background: rgba(255,255,255,0.2);
            width: 70px;
            height: 70px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .church-big .name {
            font-size: 2em;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        .route-icons {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 12px 18px;
            border-radius: 50px;
            width: fit-content;
            font-size: 1.3em;
        }

        .route-icons span {
            background: white;
            color: #FF6B6B;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8em;
            font-weight: bold;
        }

        /* ===== CARTE ===== */
        .map-box {
            margin: -20px 15px 15px;
            position: relative;
            z-index: 10;
        }

        #map {
            height: 300px;
            border-radius: 30px;
            border: 5px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .live-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            padding: 8px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            font-size: 0.9em;
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background: #FF6B6B;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===== GROS MESSAGE DU MOMENT ===== */
        .big-message {
            background: white;
            margin: 15px;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .message-emoji {
            font-size: 3em;
            text-align: center;
            margin-bottom: 10px;
        }

        .message-text {
            font-size: 1.6em;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            color: #1e293b;
        }

        .message-small {
            text-align: center;
            color: #64748b;
            margin-top: 10px;
            font-size: 0.9em;
        }

        /* ===== POINTS D'ARRÊT SUPER VISUELS ===== */
        .stops-area {
            margin: 15px;
        }

        .stop-row {
            background: white;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .stop-row.completed {
            background: #f0fff4;
            border-color: #68D391;
        }

        .stop-row.active {
            background: #fffaf0;
            border-color: #F6AD55;
            animation: gentle-pulse 1.5s infinite;
        }

        @keyframes gentle-pulse {
            0% { border-color: #F6AD55; }
            50% { border-color: #FF8C42; }
            100% { border-color: #F6AD55; }
        }

        .stop-emoji {
            font-size: 2.8em;
            width: 70px;
            height: 70px;
            background: #f1f5f9;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stop-row.completed .stop-emoji {
            background: #68D391;
            color: white;
        }

        .stop-row.active .stop-emoji {
            background: #F6AD55;
            color: white;
        }

        .stop-info {
            flex: 1;
        }

        .stop-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .stop-address {
            color: #64748b;
            font-size: 0.9em;
        }

        .stop-badge {
            background: #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .stop-row.completed .stop-badge {
            background: #68D391;
            color: #22543d;
        }

        .stop-row.active .stop-badge {
            background: #F6AD55;
            color: #7b341e;
        }

        /* ===== NOTIFICATIONS EN GROS ===== */
        .notif-section {
            background: white;
            margin: 15px;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .notif-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .notif-card {
            background: #f8fafc;
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 10px;
            border-left: 8px solid #FF6B6B;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notif-time {
            background: #FF6B6B;
            color: white;
            padding: 8px 15px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1em;
            min-width: 70px;
            text-align: center;
        }

        .notif-message {
            font-size: 1.2em;
            color: #1e293b;
            line-height: 1.4;
        }

        .notif-message .emoji {
            font-size: 1.4em;
            margin-right: 5px;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin: 20px;
            color: #94a3b8;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- En-tête coloré -->
    <div class="top-bar">
        <div class="church-big">
            <div class="icon">⛪</div>
            <div class="name">Charisma</div>
        </div>
        <div class="route-icons">
            ⛪ <span>→</span> 🏠 <span>→</span> 🚉 <span>→</span> ⛪
        </div>
    </div>

    <!-- Carte -->
    <div class="map-box">
        <div id="map"></div>
        <div class="live-badge">
            <span class="live-dot"></span> EN DIRECT
        </div>
    </div>

    <!-- Message du moment (gros et clair) -->
    <div class="big-message" id="bigMessage">
        <div class="message-emoji" id="messageEmoji">🚌</div>
        <div class="message-text" id="messageText">En attendant le bus...</div>
        <div class="message-small" id="messageTime">--:--</div>
    </div>

    <!-- Points d'arrêt visuels -->
    <div class="stops-area" id="stopsArea">
        <!-- Église -->
        <div class="stop-row" id="stopEglise">
            <div class="stop-emoji">⛪</div>
            <div class="stop-info">
                <div class="stop-name">Église Charisma</div>
                <div class="stop-address">7 Rue Isaac Newton</div>
            </div>
            <div class="stop-badge" id="badgeEglise">⚪</div>
        </div>

        <!-- Brement -->
        <div class="stop-row" id="stopBrement">
            <div class="stop-emoji">🏠</div>
            <div class="stop-info">
                <div class="stop-name">Brement</div>
                <div class="stop-address">Général de Gaulle</div>
            </div>
            <div class="stop-badge" id="badgeBrement">⚪</div>
        </div>

        <!-- Noisy -->
        <div class="stop-row" id="stopNoisy">
            <div class="stop-emoji">🚉</div>
            <div class="stop-info">
                <div class="stop-name">Noisy-le-Sec</div>
                <div class="stop-address">5 Bd de la République</div>
            </div>
            <div class="stop-badge" id="badgeNoisy">⚪</div>
        </div>

        <!-- Retour -->
        <div class="stop-row" id="stopRetour">
            <div class="stop-emoji">⛪</div>
            <div class="stop-info">
                <div class="stop-name">Retour Église</div>
                <div class="stop-address">7 Rue Isaac Newton</div>
            </div>
            <div class="stop-badge" id="badgeRetour">⚪</div>
        </div>
    </div>

    <!-- Notifications -->
    <div class="notif-section">
        <div class="notif-title">
            <span>🔔</span> Dernières nouvelles
        </div>
        <div id="notificationsList">
            <div class="notif-card">
                <div class="notif-time">--:--</div>
                <div class="notif-message">En attendant le départ...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        🙏 Que Dieu bénisse ce voyage
    </div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC4sWMc3fNaMpZ9cD8ahQdMJn6BjRyJDzk",
            authDomain: "charisma-bus.firebaseapp.com",
            databaseURL: "https://charisma-bus-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "charisma-bus",
            storageBucket: "charisma-bus.firebasestorage.app",
            messagingSenderId: "630450080183",
            appId: "1:630450080183:web:c204b463f63b12a8d30032"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Coordonnées
        const STOP_COORDINATES = {
            eglise: [48.94525, 2.47403],
            brement: [48.8934, 2.4587],
            noisy: [48.8912, 2.4523],
            retour: [48.94525, 2.47403]
        };

        // Messages visuels (simples)
        const messages = {
            depart: { 
                emoji: "⛪🚌", 
                text: "Départ de l'église !",
                big: "Église, réjouis-toi ! 🙏"
            },
            brement: { 
                emoji: "🏠✨", 
                text: "Arrivée à Brement",
                big: "Noisy-LE-FEUX, on arrive ! 🔥"
            },
            noisy: { 
                emoji: "🚉🎉", 
                text: "Arrivée à Noisy",
                big: "C'est partie ! 🎊"
            },
            retour: { 
                emoji: "⛪🏠", 
                text: "Retour à l'église",
                big: "Merci d'avoir voyagé ! ❤️"
            }
        };

        // Initialisation carte avec vue simple mais claire
        const map = L.map('map').setView([48.92, 2.46], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap'
        }).addTo(map);

        // Marqueurs colorés et simples
        const markers = {
            eglise: L.marker(STOP_COORDINATES.eglise, {
                icon: L.divIcon({ html: '⛪', className: 'marker', iconSize: [30, 30] })
            }).addTo(map),
            brement: L.marker(STOP_COORDINATES.brement, {
                icon: L.divIcon({ html: '🏠', className: 'marker', iconSize: [30, 30] })
            }).addTo(map),
            noisy: L.marker(STOP_COORDINATES.noisy, {
                icon: L.divIcon({ html: '🚉', className: 'marker', iconSize: [30, 30] })
            }).addTo(map),
            retour: L.marker(STOP_COORDINATES.retour, {
                icon: L.divIcon({ html: '⛪', className: 'marker', iconSize: [30, 30] })
            }).addTo(map)
        };

        // Ligne du trajet
        L.polyline([
            STOP_COORDINATES.eglise,
            STOP_COORDINATES.brement,
            STOP_COORDINATES.noisy,
            STOP_COORDINATES.retour
        ], { color: '#FF6B6B', weight: 5, opacity: 0.6, dashArray: '8, 10' }).addTo(map);

        // Bus
        const busMarker = L.marker(STOP_COORDINATES.eglise, {
            icon: L.divIcon({ html: '🚌', className: 'bus-marker', iconSize: [40, 40] })
        }).addTo(map);

        // Fonction de mise à jour ultra simple
        function updateDisplay(data) {
            if (!data) return;

            // Réinitialiser
            document.querySelectorAll('.stop-row').forEach(el => {
                el.classList.remove('completed', 'active');
            });

            // Mise à jour selon l'étape
            switch(data.etape) {
                case 'depart':
                    busMarker.setLatLng(STOP_COORDINATES.eglise);
                    map.panTo(STOP_COORDINATES.eglise);
                    
                    document.getElementById('messageEmoji').innerText = messages.depart.emoji;
                    document.getElementById('messageText').innerText = messages.depart.big;
                    
                    document.getElementById('stopEglise').classList.add('completed');
                    document.getElementById('stopBrement').classList.add('active');
                    
                    document.getElementById('badgeEglise').innerText = '✅';
                    document.getElementById('badgeBrement').innerText = '⏳';
                    document.getElementById('badgeNoisy').innerText = '⚪';
                    document.getElementById('badgeRetour').innerText = '⚪';
                    break;

                case 'brement':
                    busMarker.setLatLng(STOP_COORDINATES.brement);
                    map.panTo(STOP_COORDINATES.brement);
                    
                    document.getElementById('messageEmoji').innerText = messages.brement.emoji;
                    document.getElementById('messageText').innerText = messages.brement.big;
                    
                    document.getElementById('stopEglise').classList.add('completed');
                    document.getElementById('stopBrement').classList.add('completed');
                    document.getElementById('stopNoisy').classList.add('active');
                    
                    document.getElementById('badgeEglise').innerText = '✅';
                    document.getElementById('badgeBrement').innerText = '✅';
                    document.getElementById('badgeNoisy').innerText = '⏳';
                    document.getElementById('badgeRetour').innerText = '⚪';
                    break;

                case 'noisy':
                    busMarker.setLatLng(STOP_COORDINATES.noisy);
                    map.panTo(STOP_COORDINATES.noisy);
                    
                    document.getElementById('messageEmoji').innerText = messages.noisy.emoji;
                    document.getElementById('messageText').innerText = messages.noisy.big;
                    
                    document.getElementById('stopEglise').classList.add('completed');
                    document.getElementById('stopBrement').classList.add('completed');
                    document.getElementById('stopNoisy').classList.add('completed');
                    document.getElementById('stopRetour').classList.add('active');
                    
                    document.getElementById('badgeEglise').innerText = '✅';
                    document.getElementById('badgeBrement').innerText = '✅';
                    document.getElementById('badgeNoisy').innerText = '✅';
                    document.getElementById('badgeRetour').innerText = '⏳';
                    break;

                case 'retour':
                    busMarker.setLatLng(STOP_COORDINATES.retour);
                    map.panTo(STOP_COORDINATES.retour);
                    
                    document.getElementById('messageEmoji').innerText = messages.retour.emoji;
                    document.getElementById('messageText').innerText = messages.retour.big;
                    
                    document.querySelectorAll('.stop-row').forEach(el => {
                        el.classList.add('completed');
                    });
                    
                    document.getElementById('badgeEglise').innerText = '✅';
                    document.getElementById('badgeBrement').innerText = '✅';
                    document.getElementById('badgeNoisy').innerText = '✅';
                    document.getElementById('badgeRetour').innerText = '✅';
                    break;
            }

            // Ajouter notification
            let notifText = "";
            switch(data.etape) {
                case 'depart': notifText = "⛪ Départ de l'église !"; break;
                case 'brement': notifText = "🏠 Arrivée à Brement"; break;
                case 'noisy': notifText = "🚉 Arrivée à Noisy"; break;
                case 'retour': notifText = "⛪ Retour à l'église"; break;
            }

            const list = document.getElementById('notificationsList');
            const newNotif = document.createElement('div');
            newNotif.className = 'notif-card';
            newNotif.innerHTML = `
                <div class="notif-time">${data.time}</div>
                <div class="notif-message"><span class="emoji">🔔</span> ${notifText}</div>
            `;
            list.insertBefore(newNotif, list.firstChild);
            
            while(list.children.length > 5) {
                list.removeChild(list.lastChild);
            }

            document.getElementById('messageTime').innerText = data.time;
        }

        // Écouter Firebase
        database.ref('bus-status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateDisplay(data);
        });

        // Heure
        setInterval(() => {
            const now = new Date();
            const time = now.getHours() + ':' + 
                        (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            document.getElementById('messageTime').innerText = time;
        }, 1000);
    </script>
</body>
</html>

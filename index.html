<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi du Bus</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
        }
        h1 { text-align: center; }
        .status {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2em;
            font-weight: bold;
        }
        .notification {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #4CAF50;
        }
        .time {
            font-size: 0.8em;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚌 Bus Charisma</h1>
        <p style="text-align: center;">Église → Brement → Noisy → Église</p>
        
        <div class="status" id="liveStatus">
            En attente du signal...
        </div>
        
        <h3>🔔 Notifications</h3>
        <div id="notifications"></div>
    </div>

    <script>
        function updateDisplay() {
            const saved = localStorage.getItem('busUpdate');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('liveStatus').innerHTML = 
                        `${data.message}<br><small style="color:#999;">${data.time}</small>`;
                    
                    const notif = document.getElementById('notifications');
                    const newNotif = document.createElement('div');
                    newNotif.className = 'notification';
                    newNotif.innerHTML = `<div class="time">${data.time}</div>${data.message}`;
                    notif.insertBefore(newNotif, notif.firstChild);
                    
                    while(notif.children.length > 5) {
                        notif.removeChild(notif.lastChild);
                    }
                } catch(e) {}
            }
        }
        
        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>

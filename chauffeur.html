<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conducteur - Bus</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { text-align: center; }
        button {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        .depart { background: #ff9800; }
        .brement { background: #2196F3; }
        .noisy { background: #9C27B0; }
        .retour { background: #4CAF50; }
        .info {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚌 Contrôle conducteur</h1>
        
        <div class="info" id="status">
            Prêt à démarrer
        </div>
        
        <button class="depart" onclick="updateStatus('DÉPART Église')">⛪ DÉPART Église</button>
        <button class="brement" onclick="updateStatus('ARRIVÉE Brement')">🏠 ARRIVÉE Brement</button>
        <button class="noisy" onclick="updateStatus('ARRIVÉE Noisy')">🏠 ARRIVÉE Noisy</button>
        <button class="retour" onclick="updateStatus('RETOUR Église')">⛪ RETOUR Église</button>
    </div>

    <script>
        function updateStatus(message) {
            const now = new Date();
            const time = now.getHours() + ':' + 
                        (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            const data = {
                message: message,
                time: time
            };
            
            localStorage.setItem('busUpdate', JSON.stringify(data));
            document.getElementById('status').innerHTML = 
                `✅ ${message}<br><small>${time}</small>`;
        }
    </script>
</body>
</html>

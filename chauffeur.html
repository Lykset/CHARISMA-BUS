<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>🚌 Conducteur - Bus Charisma</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .status-box {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-depart { background: #ff9800; }
        .btn-brement { background: #2196F3; }
        .btn-noisy { background: #9C27B0; }
        .btn-retour { background: #4CAF50; }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* Section messages de trafic */
        .traffic-section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
        }

        .traffic-title {
            color: white;
            margin-bottom: 10px;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .traffic-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .traffic-btn {
            padding: 10px 15px;
            font-size: 0.9em;
            background: #f59e0b;
            flex: 1;
            min-width: 100px;
        }

        .custom-traffic {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .custom-traffic input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
        }

        .custom-traffic button {
            padding: 12px 20px;
            background: #f59e0b;
            flex: 0;
        }

        /* Modal pour le comptage */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .counter-btn {
            width: 60px;
            height: 60px;
            font-size: 2em;
            border-radius: 60px;
            background: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
        }

        .counter-value {
            font-size: 2.5em;
            font-weight: bold;
            min-width: 80px;
            color: #333;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
        }

        .btn-confirm { background: #4CAF50; }
        .btn-cancel { background: #f44336; }

        /* Compte rendu final */
        .report-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            color: white;
            text-align: center;
        }

        .report-card h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .report-stats {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
        }

        .report-stats p {
            margin: 8px 0;
            font-size: 1.1em;
        }

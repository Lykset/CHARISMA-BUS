<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Charisma - Suivi</title>
    <!-- Firebase version 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
        }
        .route {
            text-align: center;
            margin: 10px 0 20px 0;
            opacity: 0.9;
        }
        .status-card {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .live-badge {
            background: #4CAF50;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .message {
            font-size: 1.4em;
            font-weight: bold;
            margin: 15px 0;
        }
        .time {
            color: #999;
            font-size: 0.9em;
        }
        .notifications {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .notif-title {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        .notif-item {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #4CAF50;
        }
        .notif-time {
            font-size: 0.8em;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8em;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛪ Église Charisma</h1>
        <div class="route">Blanc-Mesnil → Brement → Noisy-le-Sec → Blanc-Mesnil</div>
        
        <div class="status-card" id="statusCard">
            <span class="live-badge">🔴 EN DIRECT</span>
            <div class="message" id="liveMessage">En attente du signal...</div>
            <div class="time" id="liveTime">Dernière mise à jour: --</div>
        </div>
        
        <div class="notifications">
            <div class="notif-title">🔔 Dernières notifications</div>
            <div id="notificationsList">
                <div class="notif-item">
                    <div class="notif-time">--</div>
                    <div>En attente du départ</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            Charisma Bus Tracker • Mise à jour en temps réel
        </div>
    </div>

    <script>
        // === TA CONFIGURATION FIREBASE (la même) ===
        const firebaseConfig = {
            apiKey: "AIzaSyC4sWMc3fNaMpZ9cD8ahQdMJn6BjRyJDzk",
            authDomain: "charisma-bus.firebaseapp.com",
            databaseURL: "https://charisma-bus-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "charisma-bus",
            storageBucket: "charisma-bus.firebasestorage.app",
            messagingSenderId: "630450080183",
            appId: "1:630450080183:web:c204b463f63b12a8d30032"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Écouter les changements en temps réel
        database.ref('bus-status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Mettre à jour le message principal
                document.getElementById('liveMessage').innerText = data.message;
                document.getElementById('liveTime').innerHTML = `Dernière mise à jour: ${data.time}`;
                
                // Ajouter une notification
                const list = document.getElementById('notificationsList');
                const newNotif = document.createElement('div');
                newNotif.className = 'notif-item';
                newNotif.innerHTML = `
                    <div class="notif-time">${data.time}</div>
                    <div>${data.message}</div>
                `;
                list.insertBefore(newNotif, list.firstChild);
                
                // Garder seulement les 5 dernières notifications
                while(list.children.length > 5) {
                    list.removeChild(list.lastChild);
                }
            }
        });

        console.log('✅ Page membre prête - écoute Firebase active');
    </script>
</body>
</html>

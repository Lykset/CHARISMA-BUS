<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🚌 Conducteur - Bus Charisma</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .status-box {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-depart { background: #ff9800; }
        .btn-brement { background: #2196F3; }
        .btn-noisy { background: #9C27B0; }
        .btn-retour { background: #4CAF50; }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* Modal pour le comptage des passagers */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .counter-btn {
            width: 60px;
            height: 60px;
            font-size: 2em;
            border-radius: 60px;
            background: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
        }

        .counter-btn:active {
            transform: scale(0.95);
        }

        .counter-value {
            font-size: 2.5em;
            font-weight: bold;
            min-width: 80px;
            color: #333;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
        }

        .btn-confirm { background: #4CAF50; }
        .btn-cancel { background: #f44336; }

        /* Compte rendu final */
        .report-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            color: white;
            text-align: center;
        }

        .report-card h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .report-stats {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
        }

        .report-stats p {
            margin: 8px 0;
            font-size: 1.1em;
        }

        .total-passengers {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid rgba(255,255,255,0.3);
        }

        .reset-btn {
            background: #ff9800;
            margin-top: 15px;
        }

        .history-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .history-item {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            font-size: 0.9em;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚌 Conducteur Charisma</h1>
        
        <div class="status-box" id="status">
            📍 Prêt à démarrer
        </div>

        <div class="btn-group">
            <button class="btn-depart" id="btnDepart" onclick="askPassengers('depart', 'Départ Église')">
                🚌 DÉPART Église
            </button>
            <button class="btn-brement" id="btnBrement" onclick="askPassengers('brement', 'Arrivée Brement')" disabled>
                🏠 ARRIVÉE Brement
            </button>
            <button class="btn-noisy" id="btnNoisy" onclick="askPassengers('noisy', 'Arrivée Noisy')" disabled>
                🚉 ARRIVÉE Noisy
            </button>
            <button class="btn-retour" id="btnRetour" onclick="askPassengers('retour', 'Retour Église')" disabled>
                ⛪ RETOUR Église
            </button>
        </div>

        <!-- Zone de compte rendu -->
        <div id="reportArea" style="display: none;"></div>

        <div class="history-section">
            <h3 style="color:white; margin-bottom:10px;">📋 Historique des arrêts</h3>
            <div id="historyList"></div>
        </div>

        <div class="footer">
            N'oubliez pas de compter les passagers à chaque arrêt
        </div>
    </div>

    <!-- Modal de comptage des passagers -->
    <div id="passengerModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Comptage des passagers</h2>
            <div class="counter">
                <button class="counter-btn" onclick="decrementCount()">-</button>
                <span class="counter-value" id="passengerCount">0</span>
                <button class="counter-btn" onclick="incrementCount()">+</button>
            </div>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="confirmPassengers()">✓ Valider</button>
                <button class="btn-cancel" onclick="closeModal()">✗ Annuler</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4sWMc3fNaMpZ9cD8ahQdMJn6BjRyJDzk",
            authDomain: "charisma-bus.firebaseapp.com",
            databaseURL: "https://charisma-bus-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "charisma-bus",
            storageBucket: "charisma-bus.firebasestorage.app",
            messagingSenderId: "630450080183",
            appId: "1:630450080183:web:c204b463f63b12a8d30032"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentStep = null;
        let currentPassengerCount = 0;
        let pendingEtape = null;
        let pendingMessage = null;
        
        let passengersData = {
            eglise: 0,
            brement: 0,
            noisy: 0,
            retour: 0
        };
        
        let history = [];

        // Écouter l'état actuel pour activer/désactiver les boutons
        database.ref('bus-status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentStep = data.etape;
                updateButtonsState();
            }
        });

        // Écouter les données des passagers
        database.ref('passengers').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                passengersData = { ...passengersData, ...data };
                updateReport();
            }
        });

        function updateButtonsState() {
            const btnDepart = document.getElementById('btnDepart');
            const btnBrement = document.getElementById('btnBrement');
            const btnNoisy = document.getElementById('btnNoisy');
            const btnRetour = document.getElementById('btnRetour');

            switch(currentStep) {
                case null:
                case undefined:
                    btnDepart.disabled = false;
                    btnBrement.disabled = true;
                    btnNoisy.disabled = true;
                    btnRetour.disabled = true;
                    document.getElementById('status').innerHTML = '📍 Prêt à démarrer<br><small>Appuyez sur "DÉPART Église"</small>';
                    break;
                case 'depart':
                    btnDepart.disabled = true;
                    btnBrement.disabled = false;
                    btnNoisy.disabled = true;
                    btnRetour.disabled = true;
                    document.getElementById('status').innerHTML = '🚌 En route vers Brement<br><small>Prochain arrêt : Brement</small>';
                    break;
                case 'brement':
                    btnDepart.disabled = true;
                    btnBrement.disabled = true;
                    btnNoisy.disabled = false;
                    btnRetour.disabled = true;
                    document.getElementById('status').innerHTML = '🏠 Arrivé à Brement<br><small>Prochain arrêt : Noisy-le-Sec</small>';
                    break;
                case 'noisy':
                    btnDepart.disabled = true;
                    btnBrement.disabled = true;
                    btnNoisy.disabled = true;
                    btnRetour.disabled = false;
                    document.getElementById('status').innerHTML = '🚉 Arrivé à Noisy<br><small>Prochain arrêt : Retour Église</small>';
                    break;
                case 'retour':
                    btnDepart.disabled = true;
                    btnBrement.disabled = true;
                    btnNoisy.disabled = true;
                    btnRetour.disabled = true;
                    document.getElementById('status').innerHTML = '✅ Voyage terminé !<br><small>Merci d\'avoir conduit</small>';
                    break;
            }
        }

        function askPassengers(etape, message) {
            pendingEtape = etape;
            pendingMessage = message;
            currentPassengerCount = 0;
            document.getElementById('passengerCount').innerText = '0';
            document.getElementById('modalTitle').innerHTML = `🧑‍🤝‍🧑 ${message}<br><small>Combien de personnes montent ?</small>`;
            document.getElementById('passengerModal').style.display = 'flex';
        }

        function incrementCount() {
            currentPassengerCount++;
            document.getElementById('passengerCount').innerText = currentPassengerCount;
        }

        function decrementCount() {
            if (currentPassengerCount > 0) {
                currentPassengerCount--;
                document.getElementById('passengerCount').innerText = currentPassengerCount;
            }
        }

        function closeModal() {
            document.getElementById('passengerModal').style.display = 'none';
            pendingEtape = null;
            pendingMessage = null;
        }

        function confirmPassengers() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ':' + 
                        now.getMinutes().toString().padStart(2,'0');
            
            // Enregistrer les passagers
            passengersData[pendingEtape] = currentPassengerCount;
            database.ref('passengers').set(passengersData);
            
            // Ajouter à l'historique
            history.unshift({
                stop: pendingMessage,
                passengers: currentPassengerCount,
                time: time
            });
            updateHistoryDisplay();
            
            // Envoyer la mise à jour du bus
            const data = {
                etape: pendingEtape,
                message: pendingMessage,
                time: time,
                passengers: currentPassengerCount
            };
            
            database.ref('bus-status').set(data);
            
            // Mettre à jour l'affichage
            document.getElementById('status').innerHTML = `✅ ${pendingMessage}<br><small>${time} - ${currentPassengerCount} passager(s) monté(s)</small>`;
            
            // Si c'est le retour, afficher le compte rendu complet
            if (pendingEtape === 'retour') {
                showFullReport();
            }
            
            closeModal();
        }

        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            history.slice(0, 5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <strong>${item.stop}</strong><br>
                    👥 ${item.passengers} passager(s) • ⏰ ${item.time}
                `;
                historyList.appendChild(div);
            });
            
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-item" style="opacity:0.7;">Aucun arrêt enregistré</div>';
            }
        }

        function updateReport() {
            if (currentStep === 'retour') {
                showFullReport();
            }
        }

        function showFullReport() {
            const total = (passengersData.eglise || 0) + (passengersData.brement || 0) + 
                         (passengersData.noisy || 0) + (passengersData.retour || 0);
            
            const reportArea = document.getElementById('reportArea');
            reportArea.style.display = 'block';
            reportArea.innerHTML = `
                <div class="report-card">
                    <h3>📊 COMPTE RENDU DU VOYAGE</h3>
                    <div class="report-stats">
                        <p>⛪ Départ Église: <strong>${passengersData.eglise || 0}</strong> passagers</p>
                        <p>🏠 Arrêt Brement: <strong>${passengersData.brement || 0}</strong> passagers</p>
                        <p>🚉 Arrêt Noisy: <strong>${passengersData.noisy || 0}</strong> passagers</p>
                        <p>⛪ Retour Église: <strong>${passengersData.retour || 0}</strong> passagers</p>
                        <div class="total-passengers">
                            🎯 TOTAL: ${total} PASSAGERS TRANSPORTÉS
                        </div>
                    </div>
                    <button class="reset-btn" onclick="resetJourney()">🔄 Nouveau trajet</button>
                </div>
            `;
        }

        function resetJourney() {
            if (confirm('Êtes-vous sûr de vouloir réinitialiser le trajet ? Toutes les données seront effacées.')) {
                // Réinitialiser les données
                passengersData = { eglise: 0, brement: 0, noisy: 0, retour: 0 };
                history = [];
                currentStep = null;
                
                // Effacer Firebase
                database.ref('bus-status').set(null);
                database.ref('passengers').set(null);
                
                // Réinitialiser l'affichage
                document.getElementById('reportArea').style.display = 'none';
                updateHistoryDisplay();
                updateButtonsState();
                document.getElementById('status').innerHTML = '📍 Prêt à démarrer<br><small>Appuyez sur "DÉPART Église"</small>';
            }
        }

        // Initialisation
        updateButtonsState();
        updateHistoryDisplay();
    </script>
</body>
</html>
